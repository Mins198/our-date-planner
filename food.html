<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Food Journey! 🥞✨</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff0f5;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- GIANT FLOATING BACKGROUND DECORATIONS --- */
        .bg-heart {
            position: fixed;
            color: rgba(255, 105, 180, 0.25);
            filter: drop-shadow(0 0 10px rgba(255, 182, 193, 0.6));
            z-index: -1;
            bottom: -150px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 10s linear infinite, sway 4s ease-in-out infinite alternate;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        @keyframes sway {
            0% { margin-left: 0px; }
            100% { margin-left: 50px; }
        }

        /* --- SMOOTH FADE-IN ANIMATION FOR CONTENT --- */
        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
            animation: fadeInPage 1.2s ease-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- MATCHING GLOWING GLASS CARDS --- */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.25);
            box-sizing: border-box;
            border: 1px solid rgba(255, 192, 203, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.35);
        }

        h1, h2 {
            color: #ff69b4;
            margin-top: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p { color: #666; font-size: 16px; line-height: 1.6; }

        /* --- EXPANDED 8-OPTION GRID LAYOUT --- */
        .food-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .food-option-label {
            background: linear-gradient(145deg, #fffafb, #fff0f5);
            padding: 22px 12px;
            border-radius: 16px;
            border: 2px solid rgba(255, 182, 193, 0.4);
            cursor: pointer;
            font-weight: bold;
            color: #555;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .food-option-label input[type="radio"] {
            display: none;
        }

        .food-icon {
            font-size: 34px;
        }

        .food-title {
            font-size: 15px;
        }

        .food-subtitle {
            font-size: 11px;
            color: #888;
            font-weight: normal;
        }

        /* Selected State Pop */
        .food-option-label:has(input[type="radio"]:checked) {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
            color: white;
            border-color: #ff1493;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
        }

        .food-option-label:has(input[type="radio"]:checked) .food-subtitle {
            color: #fff0f5;
        }

        .food-option-label:hover:not(:has(input[type="radio"]:checked)) {
            transform: translateY(-3px);
            border-color: #ff69b4;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.3);
        }

        /* --- BUTTON STYLING --- */
        button {
            padding: 16px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
            transition: all 0.3s ease;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.5);
        }
    </style>
</head>
<body>

<div class="bg-heart" style="left: 8%;  font-size: 110px; animation-duration: 13s; animation-delay: 0s;">🍛</div>
<div class="bg-heart" style="left: 25%; font-size: 80px;  animation-duration: 10s; animation-delay: 2s;">✨</div>
<div class="bg-heart" style="left: 45%; font-size: 140px; animation-duration: 16s; animation-delay: 1s;">🥐</div>
<div class="bg-heart" style="left: 60%; font-size: 95px;  animation-duration: 12s; animation-delay: 4s;">💕</div>
<div class="bg-heart" style="left: 78%; font-size: 120px; animation-duration: 14s; animation-delay: 3s;">🍦</div>
<div class="bg-heart" style="left: 90%; font-size: 70px;  animation-duration: 9s;  animation-delay: 5s;">🌸</div>

<div class="main-wrapper">
    <div class="card">
        <h1>What Are We Eating, Cutie? 😋🍽️✨</h1>
        <p>The date is set! 📅 Now comes the most delicious part... what is my princess craving? Choose our tasty food adventure! 👑👇</p>

        <form action="activity.html" method="GET">
            <input type="hidden" name="chosen_date" id="hiddenDate">

            <div class="food-options">
                <label class="food-option-label"><input type="radio" name="food_choice" value="Nasi Lemak" required><span class="food-icon">🥥</span><span class="food-title">Nasi Lemak</span><span class="food-subtitle">Spicy Sambal Love 🌶️</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Nasi Kandar"><span class="food-icon">🍛</span><span class="food-title">Nasi Kandar</span><span class="food-subtitle">Rich & Kuah Banjir! 🔥</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Ayam Gepuk"><span class="food-icon">🍗</span><span class="food-title">Ayam Gepuk</span><span class="food-subtitle">Crispy & Pedas Gila! 🥵</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Western Food"><span class="food-icon">🥩</span><span class="food-title">Western Food</span><span class="food-subtitle">Steaks & Cozy Pasta 🍝</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Korean Food"><span class="food-icon">🇰🇷</span><span class="food-title">Korean Food</span><span class="food-subtitle">Sweet K-Chicken & BBQ 🥢</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Cafe Hunting"><span class="food-icon">☕</span><span class="food-title">Cafe Hunting</span><span class="food-subtitle">Aesthetic Coffee & Pastries 🥐</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Desserts"><span class="food-icon">🍦</span><span class="food-title">Sweet Desserts</span><span class="food-subtitle">Cakes, Waffles & Treats 🍰</span></label>
                <label class="food-option-label"><input type="radio" name="food_choice" value="Surprise Me"><span class="food-icon">💝</span><span class="food-title">Surprise Me!</span><span class="food-subtitle">You pick, I follow 🥰</span></label>
            </div>

            <button type="submit">Next: What are we doing after? 🎬➡️</button>
        </form>
    </div>
</div>

<script>
    // Grab the date from the URL (index.html) and put it into the hidden input
    const params = new URLSearchParams(window.location.search);
    document.getElementById('hiddenDate').value = params.get('chosen_date');
</script>

</body>
</html>
