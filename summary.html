<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's A Date! 💖✨</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- BIGGER FLOATING BACKGROUND DECORATIONS --- */
        .bg-heart {
            position: fixed;
            color: rgba(255, 105, 180, 0.35); /* Slightly more opaque for visibility */
            z-index: -1;
            bottom: -200px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 12s linear infinite, sway 5s ease-in-out infinite alternate;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-130vh) rotate(360deg); opacity: 0; }
        }

        @keyframes sway {
            0% { margin-left: 0px; }
            100% { margin-left: 80px; } /* Wider sway for more movement */
        }

        /* --- THE GLASS CARD --- */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.25);
            border: 2px solid rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 450px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            color: #ff1493;
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #ff69b4;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .icon {
            font-size: 100px; /* Bigger main icon */
            display: block;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

<!-- BACKGROUND ELEMENTS ARE NOW MUCH LARGER -->
<div class="bg-heart" style="left: 5%; font-size: 140px; animation-duration: 15s; animation-delay: 0s;">💖</div>
<div class="bg-heart" style="left: 25%; font-size: 110px; animation-duration: 18s; animation-delay: 2s;">✨</div>
<div class="bg-heart" style="left: 50%; font-size: 160px; animation-duration: 22s; animation-delay: 1s;">🎀</div>
<div class="bg-heart" style="left: 75%; font-size: 120px; animation-duration: 16s; animation-delay: 3s;">🧸</div>
<div class="bg-heart" style="left: 90%; font-size: 140px; animation-duration: 20s; animation-delay: 4s;">🌸</div>

<div class="container">
    <h1>It's a Date! 💖</h1>
    <span class="icon">✨🧸✨</span>
    <p>I'm so excited! Counting down every second until we get to spend this amazing day together. Let's make some wonderful memories! 🥰🎀</p>
</div>

</body>
</html>
